<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FindAR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #000; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  }
  a-scene canvas {
    background: transparent !important; /* カメラ映像を透かすため必須 */
  }

  /* ── 起動前オーバーレイ（iOSはユーザー操作が無いとセンサー許可が取れないため） ── */
  #start-overlay {
    position: fixed; inset: 0; z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #05050a; color: #eae6ff; text-align: center; padding: 24px;
  }
  #start-overlay h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; letter-spacing: 0.02em; }
  #start-overlay p { font-size: 13px; opacity: 0.6; margin: 0 0 28px; line-height: 1.6; }
  #start-button {
    padding: 14px 36px; border-radius: 999px; border: 1px solid #8f7bffaa;
    background: #6f5bff22; color: #eae6ff; font-size: 15px; letter-spacing: 0.05em;
  }
  #start-button:active { background: #6f5bff44; }

  #status-bar {
    position: fixed; top: env(safe-area-inset-top, 12px); left: 0; right: 0;
    z-index: 500; text-align: center; color: #eae6ffcc; font-size: 12px;
    letter-spacing: 0.05em; pointer-events: none; text-shadow: 0 1px 4px #000;
  }
</style>
</head>
<body>

<div id="start-overlay">
  <h1>FindAR</h1>
  <p>相手のいる場所にホログラムが表示されます。<br>カメラと位置情報の使用を許可してください。</p>
  <button id="start-button">ARを開始</button>
</div>

<div id="status-bar"></div>

<a-scene
  id="findar-scene"
  vr-mode-ui="enabled: false"
  embedded
  arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: best;"
  renderer="alpha: true; antialias: true; colorManagement: true;"
  bloom-composer
  style="display: none;"
>
  <a-camera gps-new-camera="gpsMinDistance: 5;"></a-camera>

  <!-- 出現アニメーション（0-28f、1回再生） -->
  <a-entity
    id="findar-appear"
    gltf-model="url(./FindAR_appear.glb)"
    gltf-animation-once
    gps-new-entity-place="latitude: 0; longitude: 0;"
    visible="true"
  ></a-entity>

  <!-- ループアニメーション（元データは28-90f。JS側で切り出して0起点ループ） -->
  <a-entity
    id="findar-loop"
    gltf-model="url(./FindAR_loop.glb)"
    gltf-animation-loop-trimmed="startFrame: 28; endFrame: 90; fps: 24"
    gps-new-entity-place="latitude: 0; longitude: 0;"
    visible="false"
  ></a-entity>
</a-scene>

<script type="module">
import { EffectComposer } from 'https://unpkg.com/three@0.150.1/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass }     from 'https://unpkg.com/three@0.150.1/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://unpkg.com/three@0.150.1/examples/jsm/postprocessing/UnrealBloomPass.js';

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ════════════════════════════════════════════════
// 設定値
// ════════════════════════════════════════════════
const BLOOM_STRENGTH  = 1.2;   // 光の強さ
const BLOOM_RADIUS    = 0.6;   // にじみの広がり
const BLOOM_THRESHOLD = 0.75;  // この輝度以上のピクセルだけ光る(0-1)。低いほど広範囲が光る

// ════════════════════════════════════════════════
// TODO: sender.html と同じFirebaseプロジェクトの設定値に置き換えてください
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URLの ?id=xxxx を使ってFirestoreから送信者の位置情報(スナップショット)を取得する
async function fetchTargetLocationFromFirebase() {
  const params = new URLSearchParams(location.search);
  const meetupId = params.get('id');
  if (!meetupId) {
    return { lat: NaN, lng: NaN };
  }

  try {
    const snap = await getDoc(doc(db, 'meetups', meetupId));
    if (!snap.exists()) {
      return { lat: NaN, lng: NaN };
    }
    const data = snap.data();
    return { lat: data.lat, lng: data.lng };
  } catch (err) {
    console.error('[FindAR] Firestore取得エラー:', err);
    return { lat: NaN, lng: NaN };
  }
}

// ════════════════════════════════════════════════
// Bloomコンポーネント：シーン全体にUnrealBloomPassをかける
// カメラ映像(DOM video)の透過を維持するため clearColor alpha=0 で運用
// ════════════════════════════════════════════════
AFRAME.registerComponent('bloom-composer', {
  init: function () {
    const sceneEl = this.el;
    sceneEl.addEventListener('renderstart', () => {
      const THREE = AFRAME.THREE;
      const renderer = sceneEl.renderer;
      const camera = sceneEl.camera;
      const scene = sceneEl.object3D;

      renderer.setClearColor(0x000000, 0); // 透過（背後のカメラ映像を活かす）

      const size = new THREE.Vector2();
      renderer.getSize(size);

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(size.x, size.y),
        BLOOM_STRENGTH,
        BLOOM_RADIUS,
        BLOOM_THRESHOLD
      );
      composer.addPass(bloomPass);
      composer.setSize(size.x, size.y);

      // A-Frameの通常描画をcomposer経由に差し替える
      // （AScene.prototype.render が毎フレーム renderer.render(scene, camera) を呼ぶ箇所をフック）
      const originalRender = renderer.render.bind(renderer);
      renderer.render = function () {
        composer.render();
      };

      window.addEventListener('resize', () => {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h);
        composer.setSize(w, h);
        bloomPass.setSize(w, h);
      });
    });
  }
});

// ════════════════════════════════════════════════
// 出現アニメーション：1回再生 → 完了イベント発火
// ════════════════════════════════════════════════
AFRAME.registerComponent('gltf-animation-once', {
  init: function () {
    this.mixer = null;
    this.el.addEventListener('model-loaded', (e) => {
      const THREE = AFRAME.THREE;
      const model = e.detail.model;
      const clips = model.animations;
      if (!clips || !clips.length) {
        console.warn('[FindAR] appearアニメーションが見つかりません:', this.el.id);
        return;
      }
      this.mixer = new THREE.AnimationMixer(model);
      const action = this.mixer.clipAction(clips[0]);
      action.setLoop(THREE.LoopOnce);
      action.clampWhenFinished = true;
      action.play();

      this.mixer.addEventListener('finished', () => {
        this.el.emit('findar-sequence-finished', null, false);
      });
    });
  },
  tick: function (t, dt) {
    if (this.mixer) this.mixer.update(dt / 1000);
  }
});

// ════════════════════════════════════════════════
// ループアニメーション：元クリップの[startFrame, endFrame]区間だけを
// 0起点に切り出して無限ループ再生する
// ════════════════════════════════════════════════
AFRAME.registerComponent('gltf-animation-loop-trimmed', {
  schema: {
    startFrame: { type: 'number', default: 28 },
    endFrame:   { type: 'number', default: 90 },
    fps:        { type: 'number', default: 24 }
  },
  init: function () {
    this.mixer = null;
    this.el.addEventListener('model-loaded', (e) => {
      const THREE = AFRAME.THREE;
      const model = e.detail.model;
      const clips = model.animations;
      if (!clips || !clips.length) {
        console.warn('[FindAR] loopアニメーションが見つかりません:', this.el.id);
        return;
      }
      const trimmed = THREE.AnimationUtils.subclip(
        clips[0], 'findar_loop_trimmed',
        this.data.startFrame, this.data.endFrame, this.data.fps
      );
      this.mixer = new THREE.AnimationMixer(model);
      const action = this.mixer.clipAction(trimmed);
      action.setLoop(THREE.LoopRepeat, Infinity);
      action.play();
    });
  },
  tick: function (t, dt) {
    if (this.mixer) this.mixer.update(dt / 1000);
  }
});

// ════════════════════════════════════════════════
// シーケンス制御：appear終了 → loop表示に切り替え
// ════════════════════════════════════════════════
const appearEl = document.querySelector('#findar-appear');
const loopEl = document.querySelector('#findar-loop');

appearEl.addEventListener('findar-sequence-finished', () => {
  appearEl.setAttribute('visible', false);
  loopEl.setAttribute('visible', true);
});

// ════════════════════════════════════════════════
// 起動フロー：タップでカメラ・位置情報・モーションセンサーの許可を取得
// （iOSはユーザー操作なしにセンサー許可ダイアログを出せないため必須）
// ════════════════════════════════════════════════
const startOverlay = document.getElementById('start-overlay');
const startButton = document.getElementById('start-button');
const statusBar = document.getElementById('status-bar');
const sceneEl = document.getElementById('findar-scene');

startButton.addEventListener('click', async () => {
  statusBar.textContent = '位置情報を取得中...';

  // iOS 13+ ではモーションセンサーの利用に明示的な許可が必要
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission !== 'granted') {
        statusBar.textContent = 'モーションセンサーの許可が必要です';
        return;
      }
    } catch (err) {
      console.error('[FindAR] motion permission error:', err);
    }
  }

  const target = await fetchTargetLocationFromFirebase();
  if (isNaN(target.lat) || isNaN(target.lng)) {
    statusBar.textContent = '相手の位置情報を取得できませんでした';
    return;
  }

  appearEl.setAttribute('gps-new-entity-place', `latitude: ${target.lat}; longitude: ${target.lng};`);
  loopEl.setAttribute('gps-new-entity-place', `latitude: ${target.lat}; longitude: ${target.lng};`);

  startOverlay.style.display = 'none';
  sceneEl.style.display = 'block';
  statusBar.textContent = '';
});
</script>
</body>
</html>

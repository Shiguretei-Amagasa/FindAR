<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FindAR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  }
  a-scene canvas {
    background: transparent !important; /* カメラ映像を透かすため必須 */
  }

  /* ── 起動前オーバーレイ（iOSはユーザー操作が無いとセンサー許可が取れないため） ── */
  #start-overlay {
    position: fixed; inset: 0; z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #05050a; color: #eae6ff; text-align: center; padding: 24px;
  }
  #start-overlay h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; letter-spacing: 0.02em; }
  #start-overlay p { font-size: 13px; opacity: 0.6; margin: 0 0 28px; line-height: 1.6; }
  #start-button {
    padding: 14px 36px; border-radius: 999px; border: 1px solid #8f7bffaa;
    background: #6f5bff22; color: #eae6ff; font-size: 15px; letter-spacing: 0.05em;
  }
  #start-button:active { background: #6f5bff44; }

  #status-bar {
    position: fixed; top: env(safe-area-inset-top, 12px); left: 0; right: 0;
    z-index: 500; text-align: center; color: #eae6ffcc; font-size: 12px;
    letter-spacing: 0.05em; pointer-events: none; text-shadow: 0 1px 4px #000;
  }
  #distance-display {
  position: fixed; bottom: env(safe-area-inset-bottom, 16px); left: 0; right: 0;
  z-index: 500; text-align: center; color: #eae6ffcc; font-size: 14px;
  font-weight: 600; letter-spacing: 0.05em; pointer-events: none; text-shadow: 0 1px 4px #000;
}
</style>
</head>
<body>

<div id="start-overlay">
  <h1>FindAR</h1>
  <p>相手のいる場所にホログラムが表示されます。<br>カメラと位置情報の使用を許可してください。</p>
  <button id="start-button">ARを開始</button>
</div>

<div id="status-bar"></div>
<div id="distance-display"></div>

<a-scene
  id="findar-scene"
  vr-mode-ui="enabled: false"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  renderer="alpha: true; antialias: true; colorManagement: true;"
>
  <a-camera gps-new-camera="gpsMinDistance: 5;"></a-camera>

  <!-- 出現アニメーション（0-28f、1回再生） -->
  <a-entity
    id="findar-appear"
    gltf-model="url(./FindAR_appear.glb)"
    gltf-animation-once
    gps-distance-scale
    gps-new-entity-place="latitude: 0; longitude: 0;"
    visible="true"
  ></a-entity>

  <!-- ループアニメーション（元データは28-90f。JS側で切り出して0起点ループ） -->
  <a-entity
    id="findar-loop"
    gltf-model="url(./FindAR_loop.glb)"
    gltf-animation-loop-trimmed="startFrame: 28; endFrame: 90; fps: 24"
    gps-distance-scale
    gps-new-entity-place="latitude: 0; longitude: 0;"
    visible="false"
  ></a-entity>
</a-scene>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.147.0/build/three.module.js"
  }
}
</script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, doc, getDoc }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { initializeAppCheck, ReCaptchaV3Provider }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check.js';

// ════════════════════════════════════════════════
// 設定値
// ════════════════════════════════════════════════
const BLOOM_STRENGTH  = 1.2;   // 光の強さ
const BLOOM_RADIUS    = 0.6;   // にじみの広がり
const BLOOM_THRESHOLD = 0.75;  // この輝度以上のピクセルだけ光る(0-1)。低いほど広範囲が光る

// ════════════════════════════════════════════════
// TODO: index.html と同じFirebaseプロジェクトの設定値に置き換えてください
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyByb6EuWZ9Iy9QiR0Nw6IWRb8O_JQqpMSc",
  authDomain: "findar-ae099.firebaseapp.com",
  databaseURL: "https://findar-ae099-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "findar-ae099",
  storageBucket: "findar-ae099.firebasestorage.app",
  messagingSenderId: "1043165089164",
  appId: "1:1043165089164:web:0db15bfbef3d85d8df1aa9",
  measurementId: "G-J7H2LC9FFS"
};

const app = initializeApp(firebaseConfig);

// TODO: サイトキー(シークレットキーではない方)に置き換えてください
const appCheck = initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LeQYFItAAAAAGaVvZx_Txa8M26qytXHou4ZXmqk'),
  isTokenAutoRefreshEnabled: true
});

const db = getFirestore(app);

// URLの ?id=xxxx を使ってFirestoreから送信者の位置情報(スナップショット)を取得する
async function fetchTargetLocationFromFirebase() {
  const params = new URLSearchParams(location.search);
  const meetupId = params.get('id');
  if (!meetupId) {
    return { lat: NaN, lng: NaN };
  }

  try {
    const snap = await getDoc(doc(db, 'meetups', meetupId));
    if (!snap.exists()) {
      return { lat: NaN, lng: NaN };
    }
    const data = snap.data();
    return { lat: data.lat, lng: data.lng };
  } catch (err) {
    console.error('[FindAR] Firestore取得エラー:', err);
    return { lat: NaN, lng: NaN };
  }
}

// ════════════════════════════════════════════════
// Bloomコンポーネント：シーン全体にUnrealBloomPassをかける
// カメラ映像(DOM video)の透過を維持するため clearColor alpha=0 で運用
// ════════════════════════════════════════════════
AFRAME.registerComponent('bloom-composer', {
  init: function () {
    const sceneEl = this.el;
    sceneEl.addEventListener('renderstart', () => {
      const THREE = AFRAME.THREE; // ← A-Frame内蔵のTHREEのみを使用。別読み込みは一切しない
      const renderer = sceneEl.renderer;
      const camera = sceneEl.camera;
      const scene = sceneEl.object3D;

      renderer.setClearColor(0x000000, 0);

      const rtOptions = { format: THREE.RGBAFormat, minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter };
      let w = window.innerWidth, h = window.innerHeight;

      let sceneRT  = new THREE.WebGLRenderTarget(w, h, rtOptions);
      let brightRT = new THREE.WebGLRenderTarget(w / 2, h / 2, rtOptions);
      let blurRT1  = new THREE.WebGLRenderTarget(w / 2, h / 2, rtOptions);
      let blurRT2  = new THREE.WebGLRenderTarget(w / 2, h / 2, rtOptions);

      const quadCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      const quadScene = new THREE.Scene();
      const quadGeo = new THREE.PlaneGeometry(2, 2);

      const VERT = `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
      `;
      const brightMat = new THREE.ShaderMaterial({
        uniforms: { tDiffuse: { value: null }, threshold: { value: BLOOM_THRESHOLD } },
        vertexShader: VERT,
        fragmentShader: `
          uniform sampler2D tDiffuse; uniform float threshold; varying vec2 vUv;
          void main() {
            vec4 texel = texture2D(tDiffuse, vUv);
            float brightness = dot(texel.rgb, vec3(0.2126, 0.7152, 0.0722));
            float contrib = smoothstep(threshold, threshold + 0.2, brightness);
            gl_FragColor = vec4(texel.rgb * contrib, texel.a * contrib);
          }
        `
      });
      const blurMat = new THREE.ShaderMaterial({
        uniforms: { tDiffuse: { value: null }, direction: { value: new THREE.Vector2() } },
        vertexShader: VERT,
        fragmentShader: `
          uniform sampler2D tDiffuse; uniform vec2 direction; varying vec2 vUv;
          void main() {
            vec4 sum = vec4(0.0);
            sum += texture2D(tDiffuse, vUv - 4.0*direction) * 0.0162162162;
            sum += texture2D(tDiffuse, vUv - 3.0*direction) * 0.0540540541;
            sum += texture2D(tDiffuse, vUv - 2.0*direction) * 0.1216216216;
            sum += texture2D(tDiffuse, vUv - 1.0*direction) * 0.1945945946;
            sum += texture2D(tDiffuse, vUv)                 * 0.2270270270;
            sum += texture2D(tDiffuse, vUv + 1.0*direction) * 0.1945945946;
            sum += texture2D(tDiffuse, vUv + 2.0*direction) * 0.1216216216;
            sum += texture2D(tDiffuse, vUv + 3.0*direction) * 0.0540540541;
            sum += texture2D(tDiffuse, vUv + 4.0*direction) * 0.0162162162;
            gl_FragColor = sum;
          }
        `
      });
      const compositeMat = new THREE.ShaderMaterial({
        uniforms: { baseTexture: { value: null }, bloomTexture: { value: null }, bloomStrength: { value: BLOOM_STRENGTH } },
        vertexShader: VERT,
        fragmentShader: `
          uniform sampler2D baseTexture; uniform sampler2D bloomTexture; uniform float bloomStrength; varying vec2 vUv;
          void main() {
            vec4 base = texture2D(baseTexture, vUv);
            vec4 bloom = texture2D(bloomTexture, vUv);
            gl_FragColor = vec4(base.rgb + bloom.rgb * bloomStrength, base.a);
          }
        `,
        transparent: true
      });

      const quadMesh = new THREE.Mesh(quadGeo, brightMat);
      quadScene.add(quadMesh);

      function renderQuad(material, target) {
        quadMesh.material = material;
        renderer.setRenderTarget(target);
        renderer.clear();
        renderer.render(quadScene, quadCamera);
      }

      const originalRender = renderer.render.bind(renderer);
      let isRendering = false;

      renderer.render = function (s, c) {
        if (isRendering) { originalRender(s, c); return; }
        isRendering = true;

        renderer.setRenderTarget(sceneRT);
        renderer.clear();
        originalRender(scene, camera);

        brightMat.uniforms.tDiffuse.value = sceneRT.texture;
        renderQuad(brightMat, brightRT);

        blurMat.uniforms.tDiffuse.value = brightRT.texture;
        blurMat.uniforms.direction.value.set(BLOOM_RADIUS / brightRT.width, 0);
        renderQuad(blurMat, blurRT1);

        blurMat.uniforms.tDiffuse.value = blurRT1.texture;
        blurMat.uniforms.direction.value.set(0, BLOOM_RADIUS / brightRT.height);
        renderQuad(blurMat, blurRT2);

        compositeMat.uniforms.baseTexture.value = sceneRT.texture;
        compositeMat.uniforms.bloomTexture.value = blurRT2.texture;
        renderer.setRenderTarget(null);
        renderer.clear();
        renderQuad(compositeMat, null);

        isRendering = false;
      };

      window.addEventListener('resize', () => {
        w = window.innerWidth; h = window.innerHeight;
        renderer.setSize(w, h);
        sceneRT.setSize(w, h);
        brightRT.setSize(w / 2, h / 2);
        blurRT1.setSize(w / 2, h / 2);
        blurRT2.setSize(w / 2, h / 2);
      });
    });
  }
});

// ════════════════════════════════════════════════
// 出現アニメーション：1回再生 → 完了イベント発火
// ════════════════════════════════════════════════
AFRAME.registerComponent('gltf-animation-once', {
  init: function () {
    this.mixer = null;
    this.el.addEventListener('model-loaded', (e) => {
      const THREE = AFRAME.THREE;
      const model = e.detail.model;
      const clips = model.animations;
      if (!clips || !clips.length) {
        console.warn('[FindAR] appearアニメーションが見つかりません:', this.el.id);
        return;
      }
      this.mixer = new THREE.AnimationMixer(model);
      const action = this.mixer.clipAction(clips[0]);
      action.setLoop(THREE.LoopOnce);
      action.clampWhenFinished = true;
      action.play();

      this.mixer.addEventListener('finished', () => {
        this.el.emit('findar-sequence-finished', null, false);
      });
    });
  },
  tick: function (t, dt) {
    if (this.mixer) this.mixer.update(dt / 1000);
  }
});

// ════════════════════════════════════════════════
// ループアニメーション：元クリップの[startFrame, endFrame]区間だけを
// 0起点に切り出して無限ループ再生する
// ════════════════════════════════════════════════
AFRAME.registerComponent('gltf-animation-loop-trimmed', {
  schema: {
    startFrame: { type: 'number', default: 28 },
    endFrame:   { type: 'number', default: 90 },
    fps:        { type: 'number', default: 24 }
  },
  init: function () {
    this.mixer = null;
    this.el.addEventListener('model-loaded', (e) => {
      const THREE = AFRAME.THREE;
      const model = e.detail.model;
      const clips = model.animations;
      if (!clips || !clips.length) {
        console.warn('[FindAR] loopアニメーションが見つかりません:', this.el.id);
        return;
      }
      const trimmed = THREE.AnimationUtils.subclip(
        clips[0], 'findar_loop_trimmed',
        this.data.startFrame, this.data.endFrame, this.data.fps
      );
      this.mixer = new THREE.AnimationMixer(model);
      const action = this.mixer.clipAction(trimmed);
      action.setLoop(THREE.LoopRepeat, Infinity);
      action.play();
    });
  },
  tick: function (t, dt) {
    if (this.mixer) this.mixer.update(dt / 1000);
  }
});

// ════════════════════════════════════════════════
// 距離に応じてスケールを自動調整
// 遠いほど大きく、近いほど画面に収まる小ささにする
// ════════════════════════════════════════════════
AFRAME.registerComponent('gps-distance-scale', {
  schema: {
    minScale: { type: 'number', default: 0.3 },  // 近距離での最小スケール
    maxScale: { type: 'number', default: 8 },     // 遠距離での最大スケール
    factor:   { type: 'number', default: 0.08 }   // 距離1mあたりの倍率(調整用)
  },
  init: function () {
    this.cameraEl = document.querySelector('a-camera');
  },
  tick: function () {
    if (!this.cameraEl || !this.cameraEl.object3D) return;
    const distance = this.cameraEl.object3D.position.distanceTo(this.el.object3D.position);
    let scale = distance * this.data.factor;
    scale = Math.max(this.data.minScale, Math.min(this.data.maxScale, scale));
    this.el.object3D.scale.setScalar(scale);

    // 今表示されているオブジェクトの距離だけを画面に表示する
    if (this.el.getAttribute('visible')) {
      const displayEl = document.getElementById('distance-display');
      if (displayEl) {
        displayEl.textContent = `対象まで: 約${distance.toFixed(1)}m`;
      }
    }
  }
});

// ════════════════════════════════════════════════
// シーケンス制御：appear終了 → loop表示に切り替え
// ════════════════════════════════════════════════
const appearEl = document.querySelector('#findar-appear');
const loopEl = document.querySelector('#findar-loop');

appearEl.addEventListener('findar-sequence-finished', () => {
  appearEl.setAttribute('visible', false);
  loopEl.setAttribute('visible', true);
});

// ════════════════════════════════════════════════
// 起動フロー：タップでカメラ・位置情報・モーションセンサーの許可を取得
// （iOSはユーザー操作なしにセンサー許可ダイアログを出せないため必須）
// ════════════════════════════════════════════════
const startOverlay = document.getElementById('start-overlay');
const startButton = document.getElementById('start-button');
const statusBar = document.getElementById('status-bar');
const sceneEl = document.getElementById('findar-scene');

startButton.addEventListener('click', async () => {
  statusBar.textContent = '位置情報を取得中...';

  // iOS 13+ ではモーションセンサーの利用に明示的な許可が必要
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission !== 'granted') {
        statusBar.textContent = 'モーションセンサーの許可が必要です';
        return;
      }
    } catch (err) {
      console.error('[FindAR] motion permission error:', err);
    }
  }

  const target = await fetchTargetLocationFromFirebase();
  console.log('[FindAR診断] 送信された座標:', target.lat, target.lng);
  if (isNaN(target.lat) || isNaN(target.lng)) {
    statusBar.textContent = '相手の位置情報を取得できませんでした';
    return;
  }
  navigator.geolocation.getCurrentPosition(
  (pos) => {
    console.log('[FindAR診断] 自分の現在地:', pos.coords.latitude, pos.coords.longitude);
  },
  (err) => {
    console.log('[FindAR診断] 自分の現在地の取得に失敗:', err.code, err.message);
  },
  { enableHighAccuracy: true, timeout: 15000 }
);

  appearEl.setAttribute('gps-new-entity-place', `latitude: ${target.lat}; longitude: ${target.lng};`);
  loopEl.setAttribute('gps-new-entity-place', `latitude: ${target.lat}; longitude: ${target.lng};`);

  startOverlay.style.display = 'none';
  statusBar.textContent = '';
});
</script>
</body>
</html>
